<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 병합정렬 : 분할정복(작은 문제로 분할해서 푸는 방법)
      // 배열을 두개로 나누고 나눈것을 다시 두개로 나누어 최대로 나눌 수 있을 만큼 나눈 뒤 서로 비교하여 배열에 넣는 방법
      let arr = [5, 3, 7, 8, 9, 1, 2, 4];

      function merge(left, right) {
        let result = []; // 6. 정렬된 배열을 저장하기 위해 선언
        while (left.length && right.length) {
          // 7. 두 배열의 첫번째 수를 비교하여 작은수를 결과배열에 추가한다
          if (left[0] <= right[0]) {
            result.push(left.shift());
          } else {
            result.push(right.shift());
          }
        }
        while (left.length) result.push(left.shift());
        while (right.length) result.push(right.shift());
        // 8. 한쪽의 배열만 남았을 경우 남은 한쪽의 배열을 모두 결과배열에 추가한다
        return result;
      }

      const mergeSort = (array) => {
        // 1. 처음 배열을 받는다
        if (array.length < 2) return array; // 2. 배열의 길이가 1이면 그대로 다시 리턴
        let pivot = Math.floor(array.length / 2); // 3. 배열을 두개로 나누고
        let left = array.slice(0, pivot); // 4. 나눈 두 개의 배열을 따로 저장한다
        let right = array.slice(pivot, array.length);
        return merge(mergeSort(left), mergeSort(right)); //5. 두 개의 배열을 비교하여 병합한다.
        // 병합시에 두개로 나눈 배열을 재귀를 통해 나눌 수 없을때까지 쪼개준다
      };

      mergeSort(arr);

      console.log(mergeSort(arr));
    </script>
  </body>
</html>
