  <script>
    let new_id = "...!@BaT#*..y.abcdefghijklm";
    solution(new_id);

    function solution(new_id) {
      var answer = "";

      //     1. 모든 대문자 소문자로 치환
      answer = new_id.toLowerCase();

      //     2.알파벳 소문자, 숫자, 빼기, 밑줄 , 마침표를 제외한 모든 문자 제거
      answer = answer.replace(/[\{\}\[\]\/?,:\)*~!^\+<>@\#$%&\=\(]/gi, "");

      //     3.마침표 2번연속일시 하나로 치환
      answer = answer.replace(/\.+/gi, ".");

      //     4.마침표가 처음이나 끝이면 제거
      answer = answer.replace(/^\./gi, "");
      answer = answer.replace(/\.$/gi, "");

      //     5.빈 문자열이라면 "a"대입
      if (answer == "") {
        answer = "aaa";
      }

      //     6.16자 이상이면 15글자까지만 15번째에 마침표일시 마침표도 제거
      if (answer.length > 15) {
        answer = answer.substring(0, 15);
        answer = answer.replace(/\.$/gi, "");
      }
      //     7.2자 이하라면 마지막 문자를 길이가 3이 될때까지 반복

      if (answer.length < 3) {
        for (let i = answer.length; i < 3; i++) {
          answer += answer.charAt(answer.length - 1);
        }
      }

      console.log(answer);
      return answer;
    }
