<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
  <script>
    let dartResult = "1D2S3T*";

    solution(dartResult);

    function solution(dartResult) {
      var answer = 0;
      let score = [];
      let arr = dartResult.split(/(\D)/);
      arr = arr.filter((item) => item !== "");

      for (let i = 0; i < arr.length; i++) {
        if (arr[i].match(/[S]/)) {
          if (arr[i + 1] == "#") {
            score.push(parseInt(arr[i - 1]) * -1);
          } else if (arr[i + 1] == "*") {
            score.push(parseInt(arr[i - 1]) * 2);
            score[score.length - 2] *= 2;
          } else {
            score.push(parseInt(arr[i - 1]));
          }
        } else if (arr[i].match(/[D]/)) {
          if (arr[i + 1] == "#") {
            score.push(Math.pow(parseInt(arr[i - 1]), 2) * -1);
          } else if (arr[i + 1] == "*") {
            score.push(Math.pow(parseInt(arr[i - 1]), 2) * 2);
            score[score.length - 2] *= 2;
          } else {
            score.push(Math.pow(parseInt(arr[i - 1]), 2));
          }
        } else if (arr[i].match(/[T]/)) {
          if (arr[i + 1] == "#") {
            score.push(Math.pow(parseInt(arr[i - 1]), 3) * -1);
          } else if (arr[i + 1] == "*") {
            score.push(Math.pow(parseInt(arr[i - 1]), 3) * 2);
            score[score.length - 2] *= 2;
          } else {
            score.push(Math.pow(parseInt(arr[i - 1]), 3));
          }
        }
      }

      score.forEach((el) => {
        answer += el;
      });
      return answer;
    }
  </script>
</html>
