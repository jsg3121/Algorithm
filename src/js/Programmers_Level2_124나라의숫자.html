<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
  <script>
    let n = 11;
    solution(n);

    function solution(n) {
      var answer = "";
      let remain = 0;
      while (true) {
        remain = n % 3;
        if (remain == 0) {
          remain = "4";
          answer += remain;
          n = Math.floor(n / 3) - 1;
        } else {
          answer += remain;
          n = Math.floor(n / 3);
        }

        if (n / 3 == 0) break;
      }

      answer = answer.split("").reverse().join("");
      return answer;
    }
  </script>
</html>
