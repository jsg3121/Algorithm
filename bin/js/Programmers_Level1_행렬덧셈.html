<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
  <script>
    let arr1 = [[(1, 2)], [2, 3]],
      arr2 = [[(3, 4)], [5, 6]];
    solution(arr1, arr2);
    function solution(arr1, arr2) {
      var answer = arr1;

      for (let i = 0; i < arr1.length; i++) {
        for (let j = 0; j < arr1[i].length; j++) {
          answer[i][j] = arr1[i][j] + arr2[i][j];
        }
      }
      return answer;
    }
  </script>
</html>
