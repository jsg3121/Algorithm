<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 삽입정렬: 두번째 자료부터 시작하여 그 앞의 자료들과 비교하며 삽입할 위치를 지정한 후
      //           자료를 옮기고 지정한 자리에 자료를 삽입하여 정렬하는 알고리즘
      let arr = [2, 4, 6, 5, 1, 3];
      let temp = 0,
        i,
        j;

      for (i = 1; i < arr.length; i++) {
        // 배열의 2번째 숫자부터 시작
        temp = arr[i]; // 비교하고자 하는 숫자를 temp에 저장
        for (j = i - 1; j >= 0; j--) {
          // 비교할 배열의 앞부분을 순서대로 반복
          if (arr[j] > temp) {
            // 비교하고자 하는 숫자보다 앞에 있는 숫자가 크다면
            arr[j + 1] = arr[j]; // 앞에 있는 수를 뒤로 한칸씩 당겨준다
          } else {
            // 크지 않다면
            break; // 반복문을 종료
          }
        }
        arr[j + 1] = temp; // 한칸씩 뒤로 밀어주고 남은 빈자리에 비교했던 수를 넣어줌
      }

      console.log(arr);
    </script>
  </body>
</html>
